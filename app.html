<div class="editor-panel">
    <div class="input-group">
        <label>Upload Current Resume (TXT/MD)</label>
        <input type="file" id="file-upload" accept=".txt,.md">
    </div>

    <div class="input-group">
        <label for="raw-resume">Or Paste Full Resume Content</label>
        <textarea id="raw-resume" rows="15" placeholder="Paste your full resume here. I will optimize the entire document while preserving your structure..."></textarea>
    </div>

    <button id="generate-btn" class="btn-secondary">Optimize Full Resume</button>
    <p id="status-msg" class="status"></p>
</div>
