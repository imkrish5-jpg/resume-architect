<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace | Architect</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="workspace-body">
    <nav class="workspace-nav">
        <div class="logo"><span class="logo-icon">≡</span> Architect</div>
        <div>
            <button id="back-btn" class="btn-text" style="display:none; margin-right: 15px;">← Dashboard</button>
            <button id="export-pdf-btn" class="btn-primary" style="display:none;">Export PDF</button>
        </div>
    </nav>

    <div id="dashboard-view" class="dashboard-container">
        <h2 class="dashboard-title">Intelligence</h2>
        
        <button id="card-optimize" class="feature-card">
            <div class="card-icon icon-purple">💡</div>
            <h3>Resume Optimization</h3>
            <p>Intelligently rewrite your resume to highlight impact, match recruiter expectations, and pass every ATS filter.</p>
        </button>

        <button class="feature-card" onclick="alert('ATS Roast unlocks in the Pro Tier.')">
            <div class="card-icon icon-orange">📊</div>
            <h3>ATS Resume Roast <span class="badge-pro">PRO</span></h3>
            <p>Get a candid, detailed ATS score with specific weaknesses, missing keywords, and precise improvement actions.</p>
        </button>

        <button class="feature-card" onclick="alert('Cover Letter Generator unlocks in the Pro Tier.')">
            <div class="card-icon icon-blue">✉️</div>
            <h3>Cover Letter Generator <span class="badge-pro">PRO</span></h3>
            <p>Generate tailored, compelling cover letters that align with any job description and make a lasting impression.</p>
        </button>
    </div>

    <div id="workspace-view" class="split-screen" style="display: none;">
        <div class="editor-panel">
            <div class="input-group row">
                <div>
                    <label for="user-name">Full Name</label>
                    <input type="text" id="user-name" placeholder="John Doe">
                </div>
                <div>
                    <label for="user-contact">Contact Info</label>
                    <input type="text" id="user-contact" placeholder="Email | Phone | LinkedIn">
                </div>
            </div>

            <div class="input-group row">
                <div>
                    <label for="job-title">Target Role</label>
                    <input type="text" id="job-title" placeholder="Senior Software Engineer">
                </div>
                <div>
                    <label for="job-company">Company</label>
                    <input type="text" id="job-company" placeholder="Acme Corp">
                </div>
            </div>

            <div class="input-group">
                <label for="raw-notes">Raw Experience Notes</label>
                <textarea id="raw-notes" rows="8" placeholder="Paste your messy notes here... e.g., 'I built a new login system that made things 20% faster and fixed 10 bugs.'"></textarea>
            </div>

            <button id="generate-btn" class="btn-secondary">Synthesize & Render</button>
            <p id="status-msg" class="status"></p>
        </div>

        <div class="canvas-panel">
            <div class="canvas-container">
                <div id="resume-canvas" class="resume-canvas">
                    <h1 id="preview-name">John Doe</h1>
                    <p id="preview-contact">johndoe@email.com | linkedin.com/in/johndoe</p>
                    
                    <div class="resume-section">
                        <h2>EXPERIENCE</h2>
                        <div class="resume-job">
                            <div class="job-header">
                                <h3 id="preview-role">Target Role</h3>
                                <h4 id="preview-company">Company Name</h4>
                            </div>
                            <ul id="preview-bullets">
                                <li>Your elite, synthesized bullet points will appear here.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    
    <script>
        const dashboard = document.getElementById('dashboard-view');
        const workspace = document.getElementById('workspace-view');
        const backBtn = document.getElementById('back-btn');
        const exportBtn = document.getElementById('export-pdf-btn');

        // Open Editor
        document.getElementById('card-optimize').addEventListener('click', () => {
            dashboard.style.display = 'none';
            workspace.style.display = 'flex';
            backBtn.style.display = 'inline-block';
            exportBtn.style.display = 'inline-block';
        });

        // Go Back to Dashboard
        backBtn.addEventListener('click', () => {
            dashboard.style.display = 'flex';
            workspace.style.display = 'none';
            backBtn.style.display = 'none';
            exportBtn.style.display = 'none';
        });
    </script>
</body>
</html>
