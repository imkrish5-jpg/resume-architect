<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect | AI Resume Engine</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">≡</span> Architect
        </div>
        <div class="nav-links">
            <button id="login-btn" class="btn-text">Sign In</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Land More Interviews<br>With <span class="text-gradient">AI</span></h1>
        <p class="subtitle">AI-powered resume optimization built for modern job seekers.</p>
        
        <div class="hero-buttons">
            <button id="cta-btn" class="btn-primary btn-large">Start Optimizing</button>
            <button class="btn-secondary btn-large">ATS Resume Roast</button>
        </div>

        <div class="trust-stats">
            <div class="stat">
                <h3>50,000+</h3>
                <p>Resumes Optimized</p>
            </div>
            <div class="stat">
                <h3>87%</h3>
                <p>Interview Rate Increase</p>
            </div>
            <div class="stat">
                <h3>4.9 / 5</h3>
                <p>User Rating</p>
            </div>
        </div>
    </header>

    <script src="engine.js"></script>
</body>
</html>
